<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VoxLink</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
<nav class="navbar">
    <div class="nav-container">
        <div class="logo">
            <span class="logo-icon">🎙️</span>
            <span class="logo-text">VoxLink</span>
        </div>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/stats">Statistics</a>
        </div>
    </div>
</nav>

<main>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to continue to VoxLink</p>
            </div>

            <div id="loginError" class="error-message" style="display: none;"></div>
            <div id="loginSuccess" class="success-message" style="display: none;"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" class="form-input">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" class="form-input">
                </div>
                <button id="loginBtn" class="btn-primary btn-full">Sign In</button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="#" id="showRegisterBtn">Create an account</a></p>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerForm" class="auth-card" style="display: none;">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join the VoxLink community</p>
            </div>

            <div id="registerError" class="error-message" style="display: none;"></div>
            <div id="registerSuccess" class="success-message" style="display: none;"></div>

            <div class="auth-form">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" placeholder="Choose a username" class="form-input">
                </div>
                <div class="form-group">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email" class="form-input">
                </div>
                <div class="form-group">
                    <label for="regDisplayName">Display Name (Optional)</label>
                    <input type="text" id="regDisplayName" placeholder="How others see you" class="form-input">
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" class="form-input">
                </div>
                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="Confirm your password" class="form-input">
                </div>
                <button id="registerBtn" class="btn-primary btn-full">Create Account</button>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="#" id="showLoginBtn">Sign in</a></p>
            </div>
        </div>

        <!-- Invite Redirect Info -->
        <div id="inviteInfo" class="invite-redirect" style="display: none;">
            <div class="invite-redirect-content">
                <span>🔗</span>
                <p>You'll be able to join the workspace after logging in</p>
            </div>
        </div>
    </div>
</main>

<footer class="footer">
    <div class="footer-container">
        <p>&copy; 2026 VoxLink. All rights reserved.</p>
    </div>
</footer>

<script src="./js/app.js"></script>
</body>
</html>
